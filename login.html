<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - XPLORIS Morocco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="app-container">
  
    <div class="panel-left">
      <img src="https://pictures.altai-travel.com/1920x0/high-atlas-mountains-morocco-istock-3663.jpg" alt="Morocco Travel" class="cover-image">
      <div class="overlay-grad"></div>
      
      <!-- Top nav within image -->
      <div class="left-nav">
        <span class="left-brand">Explore Morocco</span>
        <div class="left-actions">
          <a href="register.html" class="outline-btn">Sign Up</a>
          <a href="#" class="outline-btn active">Join Us</a>
        </div>
      </div>

      <!-- Bottom info within image -->
      <div class="left-footer">
        <div class="profile-pill">
          <img src="assets/images/culture.png" alt="Culture" class="profile-img">
          <div class="profile-info">
            <span class="profile-name">Culture & Heritage</span>
            <span class="profile-role">Discover Morocco</span>
          </div>
        </div>
        <div class="nav-arrows">
          <button class="arrow-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="arrow-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Form -->
    <div class="panel-right">
      
      <!-- Header -->
      <header class="right-header">
        <!-- Xploris-style Logo -->
        <a href="index.html" class="xploris-logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
             <path d="M12 2L2 22h20L12 2z" fill="#E8413E"/>
             <path d="M12 8l-6 12h12L12 8z" fill="#FFF"/>
          </svg>
          MOROCCO
        </a>
        <button class="lang-selector">
          🇬🇧 EN 
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </header>

      <!-- Main Login Section -->
      <main class="form-wrapper">
        <div class="title-section">
          <h1 class="main-title">Hi Traveler</h1>
          <p class="sub-title">Welcome to MOROCCO Explorers</p>
        </div>

        <!-- Flash messages (populated by auth.js from sessionStorage) -->
        <div id="flashMsg" style="display:none;margin-bottom:12px;padding:10px 14px;border-radius:8px;font-size:.85rem;"></div>

        <form id="loginForm" action="backend/auth/login.php" method="POST" novalidate>
          <!-- CSRF token injected by auth.js -->
          <input type="hidden" name="csrf_token" id="csrfToken" value="">

          <div class="input-group">
            <input type="email" class="base-input" placeholder="Email" required id="emailStr" name="email" autocomplete="email">
            <span class="form-error" id="emailError"></span>
          </div>
          
          <div class="input-group">
            <input type="password" class="base-input" placeholder="Password" required id="passStr" name="password" autocomplete="current-password">
            <span class="form-error" id="passError"></span>
          </div>
          
          <div class="forgot-wrap">
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <div class="divider">
            <span>or</span>
          </div>

          <button type="button" class="google-btn" onclick="alert('Google OAuth coming soon!')">
            Login with Google
            <svg viewBox="0 0 24 24" width="18" height="18" class="google-icon">
              <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0112 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115z"/>
              <path fill="#34A853" d="M16.04 18.013C14.951 18.716 13.566 19.09 12 19.09c-3.133 0-5.78-2.013-6.723-4.823L1.237 17.335C3.193 21.294 7.265 24 12 24c2.933 0 5.735-1.043 7.834-3.001L16.04 18.013z"/>
              <path fill="#4A90E2" d="M19.834 20.999C22.029 18.952 23.455 15.904 23.455 12c0-.709-.091-1.473-.273-2.182H12v4.637h6.436c-.271 1.559-1.124 2.766-2.396 3.558L19.834 21z"/>
              <path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 014.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 000 12c0 1.906.433 3.712 1.237 5.335l4.04-3.067z"/>
            </svg>
          </button>

          <button type="submit" class="submit-btn" id="loginBtn">Login</button>

          <p class="signup-prompt">
            Don't have an account? <a href="register.html">Sign up</a>
          </p>
        </form>
      </main>

      <!-- Footer Social Icons -->
      <footer class="social-footer">
        <a href="#" class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>
        </a>
        <a href="#" class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>
        </a>
        <a href="#" class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2zM4 2a2 2 0 110 4 2 2 0 010-4z"/></svg>
        </a>
        <a href="#" class="social-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
        </a>
      </footer>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
