<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Morocco — Maroc Découverte</title>
  <meta name="description" content="Posez toutes vos questions sur le Maroc à notre chatbot IA : culture, histoire, voyage, cuisine, traditions...">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .chatbot-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
    }
    .chatbot-layout {
      display: flex;
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
      height: calc(100vh - 80px);
    }
    .chat-sidebar {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .chat-sidebar-header {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--secondary);
      margin-bottom: 8px;
    }

    .topic-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 0.82rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: left;
      width: 100%;
      font-family: 'Inter', sans-serif;
    }

    .topic-btn:hover {
      border-color: var(--border);
      color: var(--secondary);
      background: rgba(212,175,55,0.05);
      transform: translateX(4px);
    }
    .chat-main {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.02);
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(200,16,46,0.2);
      animation: pulse 2s infinite;
    }

    .chat-header-info .chat-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .chat-header-info .chat-status {
      font-size: 0.75rem;
      color: #22C55E;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chat-status::before {
      content: '●';
      font-size: 0.6rem;
    }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeInUp 0.3s ease;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .msg-avatar.bot {
      background: linear-gradient(135deg, #C8102E, #9A0E23);
    }

    .msg-avatar.user-a {
      background: linear-gradient(135deg, #D4AF37, #B8963E);
    }

    .msg-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      position: relative;
    }

    .msg.bot .msg-bubble {
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-top-left-radius: 4px;
      color: var(--text-primary);
    }

    .msg.user .msg-bubble {
      background: var(--gradient-red);
      color: white;
      border-top-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .msg.user .msg-time { text-align: right; }

    /* TYPING INDICATOR */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.2s ease infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* QUICK REPLIES */
    .quick-replies {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 24px 16px;
    }

    .quick-reply {
      padding: 6px 14px;
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 0.78rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .quick-reply:hover {
      border-color: var(--secondary);
      color: var(--secondary);
      background: rgba(212,175,55,0.05);
    }

    /* INPUT */
    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border-light);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: rgba(255,255,255,0.01);
    }

    .chat-input {
      flex: 1;
      background: var(--bg-dark);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
      max-height: 120px;
      transition: var(--transition);
      line-height: 1.5;
    }

    .chat-input::placeholder { color: var(--text-muted); }
    .chat-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
    }

    .chat-send-btn {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: var(--gradient-red);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .chat-send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(200,16,46,0.4);
    }

    .welcome-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .welcome-msg .welcome-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-msg h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
      background: linear-gradient(135deg, #C8102E, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-msg .welcome-features {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    .welcome-feature-tag {
      padding: 4px 12px;
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 50px;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }

    .sidebar-clear-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid rgba(200,16,46,0.3);
      border-radius: var(--radius-sm);
      color: rgba(200,16,46,0.7);
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
    }

    .sidebar-clear-btn:hover {
      background: rgba(200,16,46,0.08);
      border-color: rgba(200,16,46,0.6);
      color: #C8102E;
    }

    .msg-bubble ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
    }

    .msg-bubble li {
      margin-bottom: 4px;
    }

    .msg-bubble table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 8px;
      font-size: 0.82rem;
    }

    .msg-bubble th, .msg-bubble td {
      border: 1px solid var(--border-light);
      padding: 5px 8px;
      text-align: left;
    }

    .msg-bubble th {
      background: rgba(212,175,55,0.1);
    }

    .chat-counter {
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 0 24px 8px;
      text-align: right;
    }

    @media (max-width: 768px) {
      .chatbot-layout { grid-template-columns: 1fr; height: auto; }
      .chat-sidebar { display: none; }
      .chat-main { height: calc(100vh - 100px); }
    }
  </style>
</head>
<body>
  <div class="geo-bg">
    <div class="geo-circle geo-circle-1"></div>
    <div class="geo-circle geo-circle-2"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">🌙</div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>

  <div class="chatbot-page">
    <div class="chatbot-layout">



      <!-- CHAT MAIN -->
      <div class="chat-main">
        <div class="chat-header">
          <div class="chat-avatar">🤖</div>
          <div class="chat-header-info">
            <div class="chat-name">Atlas — Votre Guide du Maroc</div>
            <div class="chat-status">En ligne maintenant</div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="welcome-msg">
            <span class="welcome-icon">🌙</span>
            <h3>مرحبا بكم في المغرب!</h3>
            <p>Je suis <strong>Atlas</strong>, votre guide virtuel sur le Maroc. Posez-moi n'importe quelle question!</p>
            <div class="welcome-features">
              <span class="welcome-feature-tag">🏯 Villes</span>
              <span class="welcome-feature-tag">🍽️ Gastronomie</span>
              <span class="welcome-feature-tag">🎵 Musique</span>
              <span class="welcome-feature-tag">📜 Histoire</span>
              <span class="welcome-feature-tag">✈️ Voyage</span>
              <span class="welcome-feature-tag">📚 Langues</span>
            </div>
          </div>
        </div>
        <div class="chat-counter" id="chatCounter"></div>

        <div class="quick-replies" id="quickReplies">
          <button class="quick-reply" onclick="askTopic('Bonjour! Que puis-tu me dire sur le Maroc?')">👋 Bonjour!</button>
          <button class="quick-reply" onclick="askTopic('Parle-moi de Marrakech')">🏯 Marrakech</button>
          <button class="quick-reply" onclick="askTopic('Qu\'est-ce que la Jemaa el-Fna?')">🎪 Jemaa el-Fna</button>
          <button class="quick-reply" onclick="askTopic('Qu\'est-ce que Tamazight?')">🔤 Tamazight</button>
          <button class="quick-reply" onclick="askTopic('Parle-moi de la cuisine marocaine')">🍽️ Cuisine</button>
          <button class="quick-reply" onclick="askTopic('Conseils voyage Maroc')">✈️ Voyage</button>
        </div>

        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Posez votre question sur le Maroc... (Ex: Qu'est-ce que Marrakech?)" rows="1"></textarea>
          <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Envoyer (Entrée)">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
